<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WI-Trainer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- STARTBILDSCHIRM -->
      <div id="start-screen" class="screen">
        <div class="bubble-header">
          <!-- EINZIGER DARK MODE TOGGLE -->
          <div class="theme-switcher">
            <input type="checkbox" id="theme-toggle" />
            <label for="theme-toggle" class="slider"></label>
          </div>
          <h1>WI-Trainer</h1>
          <p>Prüfungsvorbereitung</p>
                  <div class="dev-version">v1.31</div>
      </div>
        </div>

        <div class="selection-group">
          <label for="subject-select">Fach auswählen:</label>
          <div class="select-wrapper">
            <select id="subject-select"></select>
          </div>
        </div>

        <div class="selection-group">
          <label for="difficulty-select" id="difficulty-label"
            >Schwierigkeit:</label
          >
          <div class="select-wrapper">
            <select id="difficulty-select">
              <!-- Optionen werden dynamisch gefüllt -->
            </select>
          </div>
        </div>

        <button id="start-btn" class="primary-btn">Quiz starten</button>
      </div>

      <!-- QUIZBILDSCHIRM -->
      <div id="quiz-screen" class="screen hidden">
        <div class="quiz-header">
          <span id="score-display" class="badge">Punkte: 0</span>
          <button id="mc-quit-btn" class="quit-btn">Beenden</button>
          <span id="questions-played" class="badge">Gespielt: 0</span>
        </div>
        <h2 id="question-text" class="question-box">
          Hier steht gleich die Frage...
        </h2>
        <div id="options-container" class="options-grid"></div>
        <div id="feedback-container" class="hidden">
          <p id="feedback-text"></p>
          <p id="explanation-text"></p>
        </div>
        <button id="check-btn" class="primary-btn hidden">
          Antwort prüfen
        </button>
        <button id="next-btn" class="primary-btn hidden">Nächste Frage</button>
      </div>

      <!-- VOKABEL-BILDSCHIRM -->
      <div id="vocab-screen" class="screen hidden">
        <div class="quiz-header">
          <span id="vocab-score-display" class="badge">Punkte: 0</span>
          <button id="vocab-quit-btn" class="quit-btn">Beenden</button>
          <span id="vocab-played-display" class="badge">Gelernt: 0 / 0</span>
        </div>

        <div id="vocab-card" class="vocab-card">
          <div class="card-face card-front">
            <p id="vocab-term">Englischer Begriff</p>
          </div>
          <div class="card-face card-back">
            <h3 id="vocab-translation">Deutsche Übersetzung</h3>
            <p id="vocab-example">Beispielsatz...</p>
          </div>
        </div>

        <div id="vocab-feedback" class="hidden">
          <p>Gewusst?</p>
          <div class="vocab-eval-buttons">
            <button id="vocab-btn-no" class="secondary-btn vocab-eval-btn">
              Nein
            </button>
            <button id="vocab-btn-yes" class="primary-btn vocab-eval-btn">
              Ja
            </button>
          </div>
        </div>
      </div>

      <!-- ERGEBNISBILDSCHIRM -->
      <div id="result-screen" class="screen hidden">
        <div class="bubble-header">
          <h2>Quiz Beendet!</h2>
          <p id="final-score">Du hast X Punkte bei Y Fragen erreicht!</p>
        </div>
         <button id="retry-incorrect-btn" class="secondary-btn hidden">Falsche wiederholen</button>
        <button id="restart-btn" class="primary-btn">Neues Quiz</button>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
